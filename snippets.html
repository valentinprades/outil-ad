<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outil-AD - Snippets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-slate-900 dark:text-slate-200 h-screen flex flex-col overflow-hidden transition-colors duration-300">

    <header class="bg-slate-900 text-white shadow-lg z-10 shrink-0">
        <div class="container mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sm:gap-0">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg cursor-pointer hover:bg-indigo-700 transition" onclick="window.location.href='index.html'" title="Retour au tableau de bord">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </div>
                <h1 class="text-lg sm:text-xl font-bold tracking-wide">Outil-AD <span class="text-indigo-400">Snippets</span></h1>
            </div>
            
            <nav class="flex flex-wrap justify-center items-center gap-1 sm:gap-2 bg-slate-800 p-1 rounded-lg w-full sm:w-auto">
                <button id="theme-toggle-snippet" title="Basculer le thème" class="text-gray-400 hover:text-yellow-400 focus:outline-none rounded-lg text-sm p-2 transition">
                    <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                    <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                </button>
                <div class="hidden sm:block w-px h-6 bg-slate-600 mx-1"></div>
                <button onclick="window.location.href='index.html'" class="px-2 sm:px-4 py-2 rounded text-xs sm:text-sm font-medium hover:text-white text-gray-400 transition">Dashboard</button>
                <button onclick="window.location.href='script-ad.html'" class="px-2 sm:px-4 py-2 rounded text-xs sm:text-sm font-medium hover:text-white text-gray-400 transition">Scripts AD</button>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-6 py-8 overflow-y-auto custom-scrollbar">
        
        <div class="flex flex-col md:flex-row justify-between items-end mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-slate-800 dark:text-white">Snippets Utiles</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-1">Vos lignes de commandes et scripts fréquents prêts à être copiés.</p>
            </div>
            
            <div class="relative w-full md:w-96">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </div>
                <input type="text" id="searchInput" onkeyup="filterSnippets()" class="block w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Rechercher (ex: réseau, dns, update)...">
            </div>
        </div>

        <!-- Grille des Snippets -->
        <div id="snippets-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pb-10">
            <!-- Les cartes seront injectées ici par JS -->
        </div>
        
        <div id="no-results" class="hidden text-center py-20">
            <p class="text-xl text-gray-500 dark:text-gray-400">Aucun snippet trouvé.</p>
        </div>
    </main>

    <script>
        // --- GESTION DU THÈME ---
        const themeToggleBtn = document.getElementById('theme-toggle-snippet');
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.remove('dark');
            themeToggleDarkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        // --- GESTION DES SNIPPETS ---
        let snippetsDatabase = [];
        const grid = document.getElementById('snippets-grid');
        const noResults = document.getElementById('no-results');

        document.addEventListener('DOMContentLoaded', () => {
            fetch('snippets.json')
                .then(response => response.json())
                .then(data => {
                    snippetsDatabase = data;
                    renderSnippets(snippetsDatabase);
                })
                .catch(err => console.error("Erreur de chargement des snippets:", err));
        });

        function renderSnippets(data) {
            grid.innerHTML = '';
            if (data.length === 0) {
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            data.forEach(snippet => {
                const card = document.createElement('div');
                card.className = "bg-white dark:bg-slate-800 p-6 rounded-xl shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col justify-between h-full";
                card.innerHTML = `
                    <div class="mb-4">
                        <span class="text-[10px] font-bold bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 px-2 py-1 rounded-full uppercase tracking-wider">${snippet.category}</span>
                        <h3 class="font-bold text-lg text-slate-800 dark:text-white mt-3 mb-2">${snippet.title}</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm">${snippet.description}</p>
                    </div>
                    <div class="relative bg-slate-900 rounded-lg p-4 border border-slate-700 group mt-auto">
                        <button onclick="copySnippet(this, \`${snippet.code.replace(/`/g, '\\`')}\`)" class="absolute top-2 right-2 text-xs bg-slate-700 hover:bg-slate-600 text-white px-3 py-1.5 rounded transition opacity-0 group-hover:opacity-100 focus:opacity-100 flex items-center gap-1 shadow-md">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            <span>Copier</span>
                        </button>
                        <pre class="text-green-400 font-mono text-sm overflow-x-auto whitespace-pre-wrap leading-relaxed">${snippet.code}</pre>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterSnippets() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = snippetsDatabase.filter(s => 
                s.title.toLowerCase().includes(query) || 
                s.description.toLowerCase().includes(query) ||
                s.category.toLowerCase().includes(query) ||
                s.code.toLowerCase().includes(query)
            );
            renderSnippets(filtered);
        }

        function copySnippet(btn, code) {
            navigator.clipboard.writeText(code).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg><span>Copié !</span>`;
                btn.classList.add('bg-green-600', 'hover:bg-green-600');
                btn.classList.remove('bg-slate-700', 'hover:bg-slate-600');
                
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.remove('bg-green-600', 'hover:bg-green-600');
                    btn.classList.add('bg-slate-700', 'hover:bg-slate-600');
                }, 2000);
            });
        }
    </script>
</body>
</html>
